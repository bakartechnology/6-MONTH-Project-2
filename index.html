<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning-Website</title>
    <link rel="stylesheet" href="./src/output.css">
    <script src="https://kit.fontawesome.com/7c2bed3620.js" crossorigin="anonymous"></script>
</head>
<style>
    @keyframes float {

        0%,
        100% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-8px);
        }
    }

    @keyframes glow {

        0%,
        100% {
            box-shadow: 0 0 15px rgba(16, 185, 129, .4);
        }

        50% {
            box-shadow: 0 0 30px rgba(16, 185, 129, .8);
        }
    }

    .floating {
        animation: float 3s ease-in-out infinite;
    }

    .glow {
        animation: glow 3s infinite;
    }
</style>

<body class="bg-black text-white">
    <!-- Toggle -->
    <input type="checkbox" id="menu-toggle" class="hidden peer">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 backdrop-blur-xl bg-white/10 border-b border-white/10 shadow-2xl">

        <div class="max-w-7xl mx-auto px-6">

            <div class="flex justify-between items-center h-20">

                <!--Nav-Logo -->
                <a href="#"
                    class="text-3xl font-extrabold bg-linear-to-r from-emerald-400 to-emerald-300 bg-clip-text text-transparent hover:scale-105 transition duration-300">
                    LearnHub
                </a>

                <!-- Desktop Nav-->
                <div class="hidden lg:flex items-center gap-10 font-medium">

                    <a href="#" class="flex items-center gap-2 hover:text-emerald-400 transition duration-300">
                        <i class="fa-solid fa-house"></i>
                        Home
                    </a>

                    <a href="#" class="flex items-center gap-2 hover:text-emerald-400 transition duration-300">
                        <i class="fa-solid fa-table-columns"></i>
                        Dashboard
                    </a>

                    <a href="#" class="flex items-center gap-2 hover:text-emerald-400 transition duration-300">
                        <i class="fa-solid fa-graduation-cap"></i>
                        Courses
                    </a>

                    <a href="#" class="flex items-center gap-2 hover:text-emerald-400 transition duration-300">
                        <i class="fa-solid fa-tags"></i>
                        Pricing
                    </a>

                    <a href="#" class="flex items-center gap-2 hover:text-emerald-400 transition duration-300">
                        <i class="fa-solid fa-envelope"></i>
                        Contact
                    </a>

                </div>

                <!-- login/SignUp Button -->
                <div class="hidden lg:flex items-center gap-3">

                    <a href="#"
                        class="px-5 py-2.5 rounded-full border border-emerald-500 text-emerald-400 hover:bg-emerald-500/20 transition duration-300 hover:text-white">
                        <i class="fa-solid fa-right-to-bracket mr-2"></i>
                        Login
                    </a>

                    <a href="#"
                        class="px-6 py-2.5 rounded-full bg-emerald-500 hover:scale-105 transition duration-300 shadow-lg shadow-emerald-500/40">
                        <i class="fa-solid fa-user-plus mr-2"></i>
                        Sign Up
                    </a>

                </div>
                <!-- Nav-Menu-Button-->
                <label for="menu-toggle" class="lg:hidden cursor-pointer text-3xl hover:text-emerald-400 transition">
                    <i class="fa-solid fa-bars"></i>
                </label>

            </div>
        </div>
    </nav>

    <!--Nav-Overlay -->
    <label for="menu-toggle"
        class="fixed inset-0 bg-black/50 opacity-0 invisible peer-checked:opacity-100 peer-checked:visible transition duration-300 z-40">
    </label>

    <!-- Nav-Sidebar -->
    <aside
        class="fixed top-0 left-0 w-72 h-full z-50 bg-white/10 backdrop-blur-2xl border-r border-white/10 shadow-2xl -translate-x-full peer-checked:translate-x-0 transition-all duration-500 overflow-y-auto">

        <div class="p-6">

            <div class="flex justify-between items-center">

                <h2 class="text-2xl font-extrabold bg-linear-to-r from-emerald-400 to-emerald-300 bg-clip-text text-transparent hover:scale-105 transition duration-300">
                    LearnHub
                </h2>

                <label for="menu-toggle" class="cursor-pointer text-3xl hover:text-emerald-400 transition">
                    <i class="fa-solid fa-xmark"></i>
                </label>

            </div>

            <nav class="mt-10 space-y-5">

                <a href="#"
                    class="group flex items-center gap-3 p-4 rounded-xl border border-transparent hover:border-emerald-500/30 hover:bg-emerald-500/10 hover:text-emerald-400 hover:translate-x-2 transition-all duration-300">
                    <i class="fa-solid fa-house text-emerald-400 group-hover:scale-110 transition duration-300"></i>
                    Home
                </a>

                <a href="#"
                    class="group flex items-center gap-3 p-4 rounded-xl border border-transparent hover:border-emerald-500/30 hover:bg-emerald-500/10 hover:text-emerald-400 hover:translate-x-2 transition-all duration-300">
                    <i class="fa-solid fa-table-columns text-emerald-400 group-hover:scale-110 transition duration-300"></i>
                    Dashboard
                </a>

                <a href="#"
                    class="group flex items-center gap-3 p-4 rounded-xl border border-transparent hover:border-emerald-500/30 hover:bg-emerald-500/10 hover:text-emerald-400 hover:translate-x-2 transition-all duration-300">
                    <i class="fa-solid fa-graduation-cap text-emerald-400 group-hover:scale-110 transition duration-300"></i>
                    Courses
                </a>

                <a href="#"
                    class="group flex items-center gap-3 p-4 rounded-xl border border-transparent hover:border-emerald-500/30 hover:bg-emerald-500/10 hover:text-emerald-400 hover:translate-x-2 transition-all duration-300">
                    <i class="fa-solid fa-tags text-emerald-400 group-hover:scale-110 transition duration-300"></i>
                    Pricing
                </a>

                <a href="#"
                    class="group flex items-center gap-3 p-4 rounded-xl border border-transparent hover:border-emerald-500/30 hover:bg-emerald-500/10 hover:text-emerald-400 hover:translate-x-2 transition-all duration-300">
                    <i class="fa-solid fa-envelope text-emerald-400 group-hover:scale-110 transition duration-300"></i>
                    Contact
                </a>

            </nav>

            <div class="mt-10 flex flex-col gap-4">

                <a href="#"
                    class="text-center py-3 rounded-xl border border-emerald-500 text-emerald-400 hover:bg-emerald-500/20 hover:text-white hover:scale-105 transition-all duration-300">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i>
                    Login
                </a>

                <a href="#"
                    class="text-center py-3 rounded-xl bg-emerald-500 hover:scale-105 hover:shadow-lg hover:shadow-emerald-500/40 transition-all duration-300">
                    <i class="fa-solid fa-user-plus mr-2"></i>
                    Sign Up
                </a>

            </div>

        </div>

    </aside>

    <!-- Hero Section -->
    <section
        class="min-h-screen flex items-center justify-center px-6 bg-linear-to-br from-black to-emerald-950">

        <div class="text-center max-w-5xl mx-auto">

            <h1
                class="text-5xl md:text-7xl font-extrabold leading-tight bg-linear-to-r from-white via-emerald-300  to-emerald-400  bg-clip-text text-transparent">

                Modern E-Learning Platform

            </h1>

            <p class="mt-6 text-white/70 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed">
                Learn professional IT skills with modern UI, smooth animations
                and industry level courses.
            </p>

            <div class="mt-10 flex flex-wrap justify-center gap-6">

                <a href="#"
                    class="px-8 py-4 rounded-full bg-emerald-500 hover:scale-110 transition duration-300 shadow-xl shadow-emerald-500/40">
                    <i class="fa-solid fa-book-open mr-2"></i>
                    Explore Courses
                </a>

                <a href="#"
                    class="px-8 py-4 rounded-full border border-emerald-400 hover:bg-emerald-500/20 transition duration-300">
                    <i class="fa-solid fa-arrow-right mr-2"></i>
                    Contact US
                </a>

            </div>

        </div>

    </section>

    <!-- Floating Action Button -->
    <a href="#"
        class="fixed bottom-6 right-6 w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center text-2xl shadow-2xl glow floating hover:scale-110 transition duration-300 z-50">
        <i class="fa-solid fa-arrow-up"></i>
    </a>

</body>

</html>
